# ═══════════════════════════════════════════════════════════════
# Link 中间件 — 工具接入配置模板
# ═══════════════════════════════════════════════════════════════
#
# 本文件是工具接入 Link 中间件的完整参考。
# 工具方只需复制此模板、填写自己的配置，即可实现智能化接入。
#
# 使用方法:
#   1. 复制本文件: cp config-template.yaml agents/my-tool.yaml
#   2. 根据下方说明填写配置
#   3. 启动: ltool start agents/my-tool.yaml
#   4. CLI 可覆盖配置: ltool start agents/my-tool.yaml --model qwen-turbo
#
# 配置分层说明:
#   .env             → 全局机密 (API Key、Matrix 服务器地址)
#   models/*.yaml    → 模型定义 (各厂商 LLM 的 API 地址和参数)
#   agents/*.yaml    → 本文件，工具方需要提供的配置
#
# ★ 标注说明:
#   [中间件提供] — 中间件已经内置，工具方可直接使用
#   [工具方提供] — 需要工具方根据自己的情况填写
#   [可选]       — 不写也能运行，按需启用


# ═══════════════════════════════════════════════════════════════
# 一、基本信息 [工具方提供]
# ═══════════════════════════════════════════════════════════════

# Agent 名称（显示在日志中，方便识别多个 Agent）
name: "我的助手"

# 系统提示词 [工具方提供]
# 这是最重要的配置项，决定了 Agent 的"性格"和行为边界
# 支持 {占位符} 语法，配合下方 context 自动注入动态数据
prompt: |
  你是一个 XXX 管理助手。你可以通过工具帮用户完成以下任务：
  - 查看 XXX 列表
  - 添加/删除 XXX
  - 查询 XXX 状态
  回复要简洁、准确、友好。
  今天的日期是 {today}


# ═══════════════════════════════════════════════════════════════
# 二、模型选择 [中间件提供]
# ═══════════════════════════════════════════════════════════════
# 填入 models/ 目录下的文件名（不含 .yaml 后缀）
# 查看所有可用模型: ltool models
# 添加新模型: 复制 models/_template.yaml 并修改
#
# 当前可用的模型:
# ┌───────────┬──────────────┬───────────────────┬──────────────────────────┐
# │ 厂商       │ 配置名        │ API 模型标识       │ 需要的 API Key            │
# ├───────────┼──────────────┼───────────────────┼──────────────────────────┤
# │ 阿里云     │ qwen-plus    │ qwen3.6-plus      │ DASHSCOPE_API_KEY        │
# │ 阿里云     │ qwen-turbo   │ qwen-turbo-latest │ DASHSCOPE_API_KEY        │
# │ OpenAI    │ gpt-4o       │ gpt-4o            │ OPENAI_API_KEY           │
# │ DeepSeek  │ deepseek-v3  │ deepseek-chat     │ DEEPSEEK_API_KEY         │
# │ 智谱      │ glm-4-plus   │ glm-4-plus        │ ZHIPU_API_KEY            │
# └───────────┴──────────────┴───────────────────┴──────────────────────────┘
#
# 「配置名」就是你在这里填的值，也是 models/ 下的文件名
# 「API 模型标识」是实际调用 API 时传的 model 参数（由模型配置文件维护）
# 使用某个模型前，需在 .env 中配置对应的 API Key

model: qwen-plus


# ═══════════════════════════════════════════════════════════════
# 三、Matrix 账户 [工具方提供]
# ═══════════════════════════════════════════════════════════════
# 每个工具需要一个独立的 Matrix 账户（与 Matrix 服务器通信）
# Matrix 服务器地址在 .env 的 MATRIX_HOMESERVER 中配置
#
# 获取正确的房间 ID:
#   curl -s http://localhost:6167/_matrix/client/v3/joined_rooms \
#     -H "Authorization: Bearer <access_token>" | python3 -m json.tool
#
# 注意: 不同 Matrix 服务器返回的房间 ID 格式不同
#   Conduit 可能返回: !abc123      （不含服务器后缀）
#   Synapse 通常返回: !abc123:localhost（含服务器后缀）
#   请以 joined_rooms API 返回的格式为准

matrix_user: "@工具名:localhost"
matrix_password: "密码"
rooms:
  - "!房间ID"


# ═══════════════════════════════════════════════════════════════
# 四、预置上下文 [可选，强烈推荐]
# ═══════════════════════════════════════════════════════════════
# 每次用户发消息时，自动调用指定工具获取最新数据，
# 将结果注入到 prompt 的 {占位符} 中
#
# 好处:
#   - 减少 LLM 调用工具的次数（数据已经预注入到 prompt 中）
#   - 提升响应速度（一次即出结果，无需多轮工具调用）
#   - 结果更准确（LLM 从一开始就掌握完整信息）
#
# 使用方式:
#   1. 在 prompt 中写占位符: {today}
#   2. 在 context 中定义: name=today, tool=get_current_time
#   3. 每次对话前中间件自动调用 get_current_time，替换 {today}
#
# 注意: context 中引用的 tool 必须在下方 tools 列表中定义
#
# 示例（订阅管理系统）:
#   prompt: |
#     你是订阅管理助手。
#     当前日期: {today}
#     用户当前订阅列表:
#     {subscriptions}
#     常用账号: {accounts}
#
#   context:
#     - name: today                  # 对应 prompt 中的 {today}
#       tool: get_current_time       # 调用已注册的工具
#     - name: subscriptions
#       tool: list_subscriptions
#     - name: accounts
#       tool: get_user_accounts
#       params:                      # 可选，调用工具时传入的参数
#         user_id: "default"
#
# refresh 刷新策略:
#   once   — 首次对话时获取，后续使用缓存（默认）
#            适合：订阅列表、用户信息等不频繁变化的数据
#   always — 每条消息都重新获取最新数据
#            适合：当前时间、实时状态等快速变化的数据

# context:
#   - name: today
#     tool: get_current_time
#     refresh: always              # 时间每次都要最新的
#   - name: subscriptions
#     tool: list_subscriptions
#     refresh: once                # 订阅列表只需首次获取（默认）


# ═══════════════════════════════════════════════════════════════
# 五、技能文件 [可选]
# ═══════════════════════════════════════════════════════════════
# 当工具比较复杂时，可以提供 Skill 文件来教 LLM 最佳工作流程
# Skill 是 Markdown 文件，描述 LLM 应遵循的操作规范和注意事项
# 内容会注入到 LLM 的 System Prompt 中，增强其领域认知
#
# 简单工具不需要写 Skill，仅靠 tools 的 description 就够了
#
# 目录结构:
#   agents/skills/我的工具/
#   └── SKILL.md          ← 操作规范、工作流程、注意事项
#
# 什么时候需要 Skill:
#   ✅ 工具操作有先后顺序依赖（先查再改再确认）
#   ✅ 工具有特殊参数格式要求
#   ✅ 工具有复杂的业务规则（金额计算、日期推算等）
#   ❌ 简单 CRUD 接口不需要

# skills_dir: "agents/skills/我的工具"


# ═══════════════════════════════════════════════════════════════
# 六、工具方工作目录 [必须]
# ═══════════════════════════════════════════════════════════════
# 所有 CLI 工具的命令都将在此目录下执行
# 另外安全检查会确保命令不会逾越此目录范围（防止路径逃逸）
#
# 同时，用户通过 Matrix 发送的文件/图片/视频会下载到此目录的 inbox/ 子目录

# work_dir: "~/path/to/tool/workspace"


# ═══════════════════════════════════════════════════════════════
# 七、工具定义 [工具方提供]
# ═══════════════════════════════════════════════════════════════
# 这是 Agent 可以调用的工具列表，LLM 根据用户意图自动选择调用
#
# 三种类型:
# ┌──────────┬───────────┬──────────────────────────────────────┐
# │ 类型      │ 提供方     │ 说明                                 │
# ├──────────┼───────────┼──────────────────────────────────────┤
# │ api      │ 工具方提供  │ 调用工具提供的 REST API               │
# │ cli      │ 工具方提供  │ 执行工具提供的命令行命令               │
# │ builtin  │ 中间件自带  │ 通用工具，无需工具方额外提供           │
# └──────────┴───────────┴──────────────────────────────────────┘

tools:

  # ─────────────────────────────────────
  # API 工具 [工具方提供]
  # ─────────────────────────────────────
  # 适用于：工具提供了 HTTP API 接口
  # 中间件会向指定 endpoint 发起 HTTP 请求
  #
  # 参数说明:
  #   name        — 工具名称（LLM 调用时使用，需唯一）
  #   description — 工具描述（LLM 根据此判断何时调用，写清楚很重要）
  #   endpoint    — API 地址（支持 ${ENV_VAR} 引用环境变量）
  #   method      — HTTP 方法 (GET/POST/PUT/DELETE)
  #   headers     — 请求头（可选，常用于 API 鉴权）
  #   body_template — POST/PUT 请求体模板（可选）
  #   parameters  — 参数定义（LLM 根据用户意图自动填充）

  - type: api
    name: "list_items"
    description: "获取所有项目列表"
    endpoint: "http://localhost:8080/api/items"
    method: GET

  - type: api
    name: "create_item"
    description: "创建一个新的项目"
    endpoint: "http://localhost:8080/api/items"
    method: POST
    headers:
      Content-Type: "application/json"
    body_template:
      name: "{name}"
      priority: "{priority}"
    parameters:
      name:
        type: string
        description: "项目名称"
        required: true
      priority:
        type: string
        description: "优先级"
        enum: ["high", "medium", "low"]
        default: "medium"


  # ─────────────────────────────────────
  # CLI 工具 [工具方提供]
  # ─────────────────────────────────────
  # 适用于：工具通过命令行调用
  # 命令中用 {参数名} 作为占位符，执行时自动替换
  # 注意：参数会自动进行 shell 转义，防止命令注入
  # 前提：必须配置 work_dir，所有命令在 work_dir 下执行

  - type: cli
    name: "search_files"
    description: "在工作目录中搜索文件"
    command: "find . -name {pattern} -type f"
    parameters:
      pattern:
        type: string
        description: "文件名模式（支持通配符）"
        required: true


  # ─────────────────────────────────────
  # 内置工具 [中间件提供，按需选用]
  # ─────────────────────────────────────
  # 这些是中间件预置的通用工具，所有接入的工具都可以直接使用
  # 无需工具方额外开发，按名称引用即可
  # 只有在 tools 列表中写了才会加载，不写不会自动启用
  #
  # 可用的内置工具:
  # ┌──────────────────────┬──────────────────────────────────────┐
  # │ 名称                  │ 功能                                │
  # ├──────────────────────┼──────────────────────────────────────┤
  # │ get_current_time     │ 获取当前日期和时间                     │
  # │ get_system_info      │ 获取操作系统、主机名、架构等系统信息     │
  # └──────────────────────┴──────────────────────────────────────┘
  #
  # 提示：内置工具也可以在 context 预置上下文中使用
  #       例如把时间预注入到 prompt 中，减少 LLM 调用次数

  - type: builtin
    name: "get_current_time"
    description: "获取当前的日期和时间"

  - type: builtin
    name: "get_system_info"
    description: "获取当前系统的基本信息"


# ═══════════════════════════════════════════════════════════════
# 八、Webhook 推送 [可选]
# ═══════════════════════════════════════════════════════════════
# 当工具需要主动推送消息给用户时配置
# ★ 只要配置了 endpoints，webhook 服务会自动启用，无需手动开关
#
# 两种推送模式:
#   urgent: true  → 消息直接转发给用户，不经 LLM 处理（适合告警）
#   urgent: false → 消息先经 LLM 整理为友好格式，再发送给用户
#
# 工具方推送方式:
#   # 文本推送
#   curl -X POST http://localhost:9001/alert \
#     -H "Content-Type: application/json" \
#     -d '{"message": "服务器 CPU 超过 90%"}'
#
#   # 文件推送
#   curl -X POST http://localhost:9001/notify \
#     -H "Content-Type: application/json" \
#     -d '{"type": "file", "path": "/path/to/screenshot.png", "caption": "截图"}'

# webhook:
#   port: 9001
#   endpoints:
#     - path: "/alert"
#       urgent: true
#       description: "紧急告警"
#     - path: "/notify"
#       urgent: false
#       description: "常规通知"


# ═══════════════════════════════════════════════════════════════
# 九、高级选项 [可选]
# ═══════════════════════════════════════════════════════════════
# 以下参数可覆盖所选模型配置中的默认值

# temperature: 0.7                    # LLM 温度 (0-1，越高越有创意)
# max_history: 20                     # 对话历史保留轮数
# enable_thinking: false              # 是否启用 LLM 思考模式
# vision: false                       # 是否启用中间件大模型的图像分析（见下方说明）
# homeserver: "http://其他服务器:6167"  # 覆盖 .env 中的 Matrix 服务器
#
# vision 图像分析说明:
#   不写 (默认) — 跟随模型能力（模型配置中 vision: true 则自动启用）
#   true        — 强制启用（用户发图片时自动送 LLM 分析）
#   false       — 强制关闭（图片只下载到本地，不经过 LLM）
#
#   适合关闭的场景：工具只需要接收文件，不需要 AI 分析图片内容


# ═══════════════════════════════════════════════════════════════
# 附录：中间件内置功能一览
# ═══════════════════════════════════════════════════════════════
#
# ┌───────────────────┬────────────────────────────────────────────────────┐
# │ 功能               │ 说明                                              │
# ├───────────────────┼────────────────────────────────────────────────────┤
# │ Function Calling  │ LLM 自动选择并调用工具 (API/CLI/Builtin)            │
# │ 对话记忆           │ 按房间隔离的滚动历史窗口 (可配 max_history)          │
# │ 预置上下文         │ 每次对话前自动调用工具获取数据注入 prompt             │
# │ 技能系统           │ 通过 Markdown 文件注入领域知识增强 LLM              │
# │ 文件收发           │ 支持用户发送图片/视频/音频/文件，自动下载到 inbox/    │
# │ 文件回传           │ 工具返回文件路径时自动上传到 Matrix 发送给用户         │
# │ 安全防护           │ 命令注入检查 + 危险命令拦截 + 路径逃逸防御           │
# │ 工作目录隔离        │ CLI 命令限制在 work_dir 内执行                     │
# │ Webhook 接收       │ 工具主动推送消息/文件给用户                         │
# │ 多模型切换         │ 同一工具可随时切换不同 LLM (--model 参数)            │
# └───────────────────┴────────────────────────────────────────────────────┘
#
# CLI 命令:
#   ltool start <config.yaml>     启动 Agent
#   ltool models                  列出可用模型
#   ltool start ... --model XX    临时切换模型
#   ltool start ... --work-dir XX 覆盖工作目录
#   ltool start ... --room XX     覆盖监听房间
